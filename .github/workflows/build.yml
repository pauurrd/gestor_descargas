name: Empaquetar Gestor de Descargas

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Dar permisos de ejecución al script
        run: chmod +x build_deb_systemd.sh

      - name: Construir el paquete .deb
        run: ./build_deb_systemd.sh

      - name: Guardar el .deb como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: instalador-gestor-descargas
          path: dist/*.deb
          retention-days: 14
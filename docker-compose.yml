services:
  # 1. El Proxy SOCKS5 (Red Tor)
  tor-proxy:
    image: alpine:edge
    container_name: poc-tor-proxy
    command: sh -c "apk add --no-cache tor && tor --SocksPort '0.0.0.0:9050'"
    ports:
      - "9050:9050"
    restart: unless-stopped

  # 2. El Motor de Descargas (Aria2)
  aria2-rpc:
    image: alpine:edge
    container_name: poc-aria2-backend
    command: >
      sh -c "apk add --no-cache aria2 && 
      aria2c --enable-rpc 
      --rpc-listen-all=true 
      --rpc-allow-origin-all 
      --rpc-listen-port=6800 
      --dir=/downloads 
      --max-connection-per-server=4 
      --min-split-size=1M"
    ports:
      - "6800:6800"
    volumes:
      - ./descargas_prueba:/downloads
    depends_on:
      - tor-proxy
    restart: unless-stopped
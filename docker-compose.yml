services:
  aria2-rpc:
    image: alpine:edge
    container_name: poc-aria2-backend
    command: >
      sh -c "apk add --no-cache aria2 && 
      aria2c --enable-rpc 
      --rpc-listen-all=true 
      --rpc-allow-origin-all 
      --rpc-listen-port=6800 
      --dir=/downloads 
      --max-connection-per-server=4 
      --split=4
      --min-split-size=1M"
    ports:
      - "6800:6800"
    volumes:
      - ./Descargas:/downloads
      - ./aria2_config:/config
    restart: unless-stopped